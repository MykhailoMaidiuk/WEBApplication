version: '3.8'

services:
  db:
    image: postgres:17
    container_name: my_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cdb-network

  backend:
    container_name: sk10-web
    build:
      context: ./backend
    ports:
      - "8009:5000"
    volumes:
      - ./backend/logs:/usr/src/app/logs
      - ./data_mock.csv:/usr/src/app/data_mock.csv
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
    networks:
      - cdb-network


  frontend:
    container_name: sk10-frontend
    build:
      context: ./frontend/react-app
    ports:
      - "3009:80"  # Map container port 80 to host port 3009
    volumes:
      - ./frontend/logs:/var/log/nginx
    networks:
      - cdb-network

  sql-client:
    image: dbeaver/cloudbeaver:latest
    container_name: sk10-sql-client
    ports:
      - "10009:8978"
    environment:
      CB_SERVER_HOST: "${CB_SERVER_HOST}"
      CB_SERVER_PORT: "${CB_SERVER_PORT}"
    networks:
      - cdb-network

networks:
  cdb-network:
    external: true
    name: cdb-network

volumes:
  postgres-data: